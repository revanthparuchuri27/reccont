<!DOCTYPE html>
<html>

<head>
	<title> movie recommendation</title>
<header>
    🎬 Movie Recommendation Platform
</header>
<style>

body{
font-family:Arial;
background:#141414;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.controls{
margin:30px;
}

select,button{
padding:10px;
font-size:16px;
margin:5px;
border-radius:5px;
border:none;
}

button{
background:#e50914;
color:white;
cursor:pointer;
}

button:hover{
background:#b20710;
}

#result{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.movie-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.movie{
background:#1f1f1f;
border-radius:10px;
padding:10px;
width:200px;
text-align:center;
transition:0.3s;
}

.movie:hover{
transform:scale(1.08);
}

.movie img{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}
.rating{
color:gold;
}

header{
background:#e50914;
padding:15px;
font-size:28px;
font-weight:bold;
text-align:center;
color:white;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<h1>🎬 Movie Recommendation System</h1>

<div class="controls">

<select id="genre">
<option>SELECT GENRE</option>
<option>Action</option>
<option>Adventure</option>
<option>Animation</option>
<option>Comedy</option>
<option>Crime</option>
<option>Drama</option>
<option>Fantasy</option>
<option>Horror</option>
<option>Romance</option>
<option>Thriller</option>

</select>
<h2>🔥 Trending Movies</h2>

<div id="trending" class="movie-container"></div><button onclick="recommend()">Show Movies</button>

<div id="result"></div>

<script>
async function recommend(){

let genre = document.getElementById("genre").value;

let result = document.getElementById("result");

/* Show loading message */
result.innerHTML = "<h2>Suggesting Movies......</h2>";

let response = await fetch("http://127.0.0.1:5000/recommend",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({genre:genre})
});

let data = await response.json();

/* Clear loading text */
result.innerHTML = "";

data.forEach(function(m){

let div=document.createElement("div");

div.className="movie";
div.innerHTML = `
<img src="${m.poster ? m.poster : 'https://via.placeholder.com/200x300?text=No+Poster'}">
<h3>${m.title}</h3>
⭐ ${m.rating ? m.rating : "N/A"}
<p>${m.genre}</p>
`;

result.appendChild(div);

});


}
async function loadTrending(){

let response = await fetch("http://127.0.0.1:5000/trending");

let data = await response.json();

let container = document.getElementById("trending");

container.innerHTML="";

data.forEach(function(m){

let div=document.createElement("div");

div.className="movie";

div.innerHTML = `
<h3>${m.title}</h3>
<img src="${m.poster}" onerror="this.src='no-poster.png'">
<p>⭐ ${m.rating ? m.rating : "N/A"}</p>
<p>${m.genre}</p>
`;

container.appendChild(div);

});

}

</script>


</body>
</html>
